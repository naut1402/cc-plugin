# Override pipeline cho RIÊNG một task — đặt tại .dev-team-agent/tasks/<id>/pipeline.yaml
#
# Patch lên global theo step.id:
#   - step trùng id  -> đè field (merge `hitl` một cấp)
#   - id mới         -> thêm vào cuối
#   - remove: true   -> bỏ hẳn bước đó
# `defaults` / `doc_reviewer` merge theo từng key.
# Chỉ cần khai phần muốn thay đổi.
version: 1

# Ví dụ: task này bật auto-review cho nhanh.
defaults:
  auto_review: true

steps:
  # Đè skill của reviewer cho task này:
  - id: reviewer
    skills: [coding-rules]      # bỏ write-tests

  # Bỏ hẳn bước tạo PR cho task này:
  - id: pr-creator
    remove: true
